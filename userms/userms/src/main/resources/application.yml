server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/userms
    username: postgres
    password: indiacricket123
  application:
    name: USER-SERVICE

  config:
    import: configserver:http://localhost:8085


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format-sql:true

